<!DOCTYPE html>

<head>

<title>My Education Pathway — Playing It Out</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf8f3;
  --bg2:#f4f0e8;
  --bg3:#ede8dc;
  --text:#2d2820;
  --muted:#8a8070;
  --subtle:#ddd8cc;
  --sans:'Asap',system-ui,sans-serif;
  --now:#d4724a;
  --msc:#7a4a9a;
  --ma:#3a7ab8;
  --phd:#5a8a3a;
  --beyond:#c8822a;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh}
header{padding:1.6rem 2rem 0.9rem;border-bottom:1px solid var(--subtle);background:var(--bg)}
header h1{font-size:1.15rem;font-weight:500;letter-spacing:-0.01em;color:var(--text)}
header p{font-size:11.5px;color:var(--muted);font-weight:300;margin-top:3px}

.canvas-wrap{width:100%;overflow-x:auto;padding:1.5rem 1rem 3rem;background:var(--bg)}

svg#map{display:block;margin:0 auto}

/* Node interactivity */
.phase-group{cursor:pointer}
.phase-group:hover .phase-leaf{opacity:0.88;transform-origin:center;transform:scale(1.03)}
.phase-leaf{transition:opacity .2s,transform .2s}
.role-leaf{cursor:pointer;transition:opacity .18s}
.role-leaf:hover{opacity:0.82}

/* Tooltip */
#tooltip{position:fixed;background:#fffdf8;border:1px solid var(--subtle);border-radius:10px;padding:13px 15px;max-width:300px;z-index:1000;pointer-events:none;opacity:0;transition:opacity .15s;box-shadow:0 3px 18px rgba(0,0,0,.09)}
#tooltip.vis{opacity:1}
.tt-phase{font-size:9px;text-transform:uppercase;letter-spacing:.1em;font-weight:500;margin-bottom:3px}
.tt-title{font-size:13.5px;font-weight:500;color:var(--text);margin-bottom:5px;line-height:1.3}
.tt-body{font-size:11.5px;color:#6a6258;line-height:1.58;font-weight:300}

/* Sidebar */
#sidebar{position:fixed;right:0;top:0;height:100vh;width:320px;background:#fffdf8;border-left:1px solid var(--subtle);padding:1.8rem 1.5rem;transform:translateX(100%);transition:transform .28s ease;z-index:200;overflow-y:auto;box-shadow:-3px 0 18px rgba(0,0,0,.06)}
#sidebar.open{transform:translateX(0)}
#sbc{position:absolute;top:.9rem;right:.9rem;background:none;border:none;color:var(--muted);font-size:17px;cursor:pointer;padding:3px 5px;border-radius:4px;font-family:var(--sans)}
#sbc:hover{background:var(--bg2)}
.sb-phase{font-size:9px;text-transform:uppercase;letter-spacing:.1em;font-weight:500;margin-bottom:5px}
.sb-title{font-size:1.15rem;font-weight:500;line-height:1.2;margin-bottom:10px;color:var(--text)}
.sb-timing{font-size:11px;color:var(--muted);margin-bottom:12px;font-weight:300;font-style:italic}
.sb-desc{font-size:12.5px;color:#5a5248;line-height:1.68;margin-bottom:14px;font-weight:300}
.sb-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:5px;font-weight:500;margin-top:12px}
.sb-list{list-style:none}
.sb-list li{font-size:12px;color:#5a5248;line-height:1.6;padding:4px 0;border-bottom:1px solid var(--subtle);font-weight:300}
.sb-list li:last-child{border-bottom:none}
.sb-list li::before{content:'→ ';color:var(--muted)}
.sb-note{font-size:11px;background:var(--bg2);border-radius:5px;padding:9px 11px;color:#5a5248;font-weight:300;line-height:1.65;border-left:3px solid;margin-top:4px}

footer{text-align:center;padding:1.2rem;font-size:10.5px;color:var(--muted);font-weight:300;border-top:1px solid var(--subtle);background:var(--bg2)}
</style>
</head>

<text x="46" y="912" font-family="Asap,sans-serif" font-size="8.5" fill="#5a4268">Transforms the lens — from "how do I make</text>
<text x="46" y="926" font-family="Asap,sans-serif" font-size="8.5" fill="#5a4268">things accessible" to "why are these barriers</text>
<text x="46" y="940" font-family="Asap,sans-serif" font-size="8.5" fill="#5a4268">here and who built them." Reframes everything</text>
<text x="46" y="954" font-family="Asap,sans-serif" font-size="8.5" fill="#5a4268">that came before it — politically and ethically.</text>

<rect x="390" y="876" width="380" height="88" rx="8" fill="#eef6fe" stroke="#b8d4f0" stroke-width="0.8"/>

<text x="406" y="912" font-family="Asap,sans-serif" font-size="8.5" fill="#2a4a78">Adds the therapeutic relationship to the theoretical</text>
<text x="406" y="926" font-family="Asap,sans-serif" font-size="8.5" fill="#2a4a78">and practical base. With a Disability Studies MSc</text>
<text x="406" y="940" font-family="Asap,sans-serif" font-size="8.5" fill="#2a4a78">underneath, the clinical work becomes unusually</text>
<text x="406" y="954" font-family="Asap,sans-serif" font-size="8.5" fill="#2a4a78">grounded in justice, not just wellness frameworks.</text>

<rect x="790" y="876" width="360" height="88" rx="8" fill="#f0f8e8" stroke="#b8d898" stroke-width="0.8"/>

<text x="806" y="912" font-family="Asap,sans-serif" font-size="8.5" fill="#2a5010">Opens the scholar-practitioner door fully. With 25+</text>
<text x="806" y="926" font-family="Asap,sans-serif" font-size="8.5" fill="#2a5010">years of practice feeding the research questions,</text>
<text x="806" y="940" font-family="Asap,sans-serif" font-size="8.5" fill="#2a5010">this is not a career pivot — it is a deepening of</text>
<text x="806" y="954" font-family="Asap,sans-serif" font-size="8.5" fill="#2a5010">everything already built. Life experience is the data.</text>

const tt = document.getElementById('tooltip');

function showTT(e, data, isPhase) {
  document.getElementById('tt-phase').textContent = data.label || data.phase || '';
  document.getElementById('tt-phase').style.color = data.color;
  document.getElementById('tt-title').textContent = data.title;
  document.getElementById('tt-body').textContent = (data.desc||'').slice(0,160) + ((data.desc||'').length>160?'…':'');
  moveTT(e);
  tt.classList.add('vis');
}
function moveTT(e) {
  const tw=300,th=160;
  let l=e.clientX+14, t=e.clientY-10;
  if(l+tw>window.innerWidth) l=e.clientX-tw-14;
  if(t+th>window.innerHeight) t=e.clientY-th-10;
  tt.style.left=l+'px'; tt.style.top=t+'px';
}
function hideTT() { tt.classList.remove('vis'); }

function openSB(data) {
  const sb = document.getElementById('sidebar');
  document.getElementById('sb-phase').textContent = data.label || data.phase || '';
  document.getElementById('sb-phase').style.color = data.color;
  document.getElementById('sb-title').textContent = data.title;
  document.getElementById('sb-timing').textContent = data.timing || '';
  document.getElementById('sb-desc').textContent = data.desc || '';

  const lbl1 = document.getElementById('sb-lbl1');
  const list = document.getElementById('sb-list');
  const lbl2 = document.getElementById('sb-lbl2');
  const note = document.getElementById('sb-note');

  if (data.points) {
    lbl1.textContent = 'What this phase involves';
    list.innerHTML = data.points.map(p=>`<li>${p}</li>`).join('');
  } else {
    lbl1.textContent = '';
    list.innerHTML = '';
  }

  if (data.note) {
    lbl2.style.display = 'block';
    lbl2.textContent = data.notelabel || 'Note';
    note.innerHTML = `<div class="sb-note" style="border-color:${data.color}">${data.note}</div>`;
  } else {
    lbl2.style.display = 'none';
    note.innerHTML = '';
  }

  sb.classList.add('open');
}

function closeSB() { document.getElementById('sidebar').classList.remove('open'); }
document.addEventListener('click', closeSB);
document.getElementById('sidebar').addEventListener('click', e=>e.stopPropagation());

// Attach events to phase groups
document.querySelectorAll('.phase-group').forEach(g => {
  const key = g.id;
  const data = phases[key.replace('p','')];
  if (!data) return;
  g.addEventListener('mouseenter', e => showTT(e, data, true));
  g.addEventListener('mousemove', moveTT);
  g.addEventListener('mouseleave', hideTT);
  g.addEventListener('click', e => { e.stopPropagation(); openSB(data); });
});

// Attach events to role leaves
document.querySelectorAll('.role-leaf').forEach(g => {
  const key = g.dataset.role;
  const data = roles[key];
  if (!data) return;
  g.addEventListener('mouseenter', e => showTT(e, data, false));
  g.addEventListener('mousemove', moveTT);
  g.addEventListener('mouseleave', hideTT);
  g.addEventListener('click', e => { e.stopPropagation(); openSB(data); });
});
</script>
